name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod tidy

      - name: Build binaries
        run: |
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o market-price-query-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o market-price-query-linux-arm64  .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o market-price-query-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o market-price-query-darwin-amd64 .

      - uses: softprops/action-gh-release@v2
        with:
          files: market-price-query-*
